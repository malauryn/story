<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>A Chance Encounter</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gentium+Book+Basic&family=UnifrakturMaguntia&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">

    <!-- Title -->
    <div class="row">
      <div class="col text-center">
        <h1 class="mt-5 pb-3 mb-1 border-bottom border-dark">A Chance Encounter</h1>
        <div class="mb-4 border-bottom border-dark"></div>
      </div>
    </div>

    <!-- Story Area -->
    <div class="row my-4 justify-content-center">
      <div class="col-12 col-lg-8">
        <div class="border-top border-dark pt-3">

          <img id="storyImage" src="" alt="" class="img-fluid mb-3 story-img">

          <p id="storyText" class="fs-5 mb-0"></p>

          <div id="choices" class="d-flex flex-wrap gap-2 mt-3"></div>

          <p id="errorBox" class="mt-3 small text-danger d-none"></p>

        </div>
      </div>
    </div>

  </div>

  <footer class="container">
    <div class="row my-5">
      <div class="col text-center">
        <div class="border-top border-dark pt-2">
          <small>(CC) Your Name</small>
        </div>
      </div>
    </div>
  </footer>

  <script src="main.js"></script>
</body>
</html>
