<!doctype html>
<html lang="en">


<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>A Chance Encounter</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">

  <style>
    :root {
      --bg: #f2ece5;
      --card: #b9b1a6;
      --text: #2f2f2f;
      --frame: #bcd6f3;

    }

    body {
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      margin: 0;
      font-family: "Jost", system-ui, sans-serif;

    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      margin-top: 36px;
      margin-bottom: 18px;
      font-style: italic;
      font-weight: 400;
      font-size: clamp(44px, 6vw, 80px);
      text-align: center;
      line-height: 1;
    }

    .content-width {
      width: min(560px, 90vw);
    }

    .art-frame {
      background: var(--frame);
      padding: 26px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .art-frame img {
      width: 100%;
      height: auto;
      display: block;
    }

    .spacer {
      flex: 1;
    }

    .story-box {
      width: min(700px, 92vw);
      background: var(--card);
      border-radius: 14px;
      padding: 22px 26px;
      text-align: center;
    }

    .story-box p {
      margin: 0 0 14px 0;
      font-size: 22px;
      line-height: 1.25;
    }

    .choices {
      display: grid;
      gap: 6px;
      font-size: 20px;
    }

    .choices a {
      color: inherit;
      text-decoration: none;
    }

    .choices a:hover {
      text-decoration: underline
    }
  </style>
</head>

<body>

  <main class="page">
    <h1> a chance encounter</h1>
    <div class="content-width">
      <div class="art-frame">
        <img src="assets/img/Art.jpg" alt="Artwork">
      </div>
    </div>

    <div class="spacer"></div>
    <div class="story-box">
      <p>
        Have you ever had a chance encounter before?<br>
        Like an encounter with someone that felt like a door <br>
        filled with possibilities? A new future?
      </p>
      <div class="choices">
        <a href="page2.html">Yes</a>
        <a href="page3.html">No...?</a>
      </div>
    </div>
  </main>

</body>

</html>
